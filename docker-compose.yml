services:

  # ────────────────────────────────────────────────────────────
  #  n8n  (workflow automation)
  # ────────────────────────────────────────────────────────────
  n8n:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: n8n
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"

    environment:
      # ── Core ─────────────────────────────────────────────────
      - N8N_HOST=${N8N_HOST:-localhost}
      - N8N_PORT=5678
      - N8N_PROTOCOL=${N8N_PROTOCOL:-http}
      - WEBHOOK_URL=${WEBHOOK_URL:-http://localhost:5678/}
      - N8N_EDITOR_BASE_URL=${N8N_EDITOR_BASE_URL:-http://localhost:5678}
      - N8N_ENABLE_EXECUTE_COMMAND=true
      - NODES_EXCLUDE=[]
      # ── Security ─────────────────────────────────────────────
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY:-change-me-in-env-file}
      - N8N_SECURE_COOKIE=${N8N_SECURE_COOKIE:-false}

      # ── Timezone ─────────────────────────────────────────────
      - GENERIC_TIMEZONE=${TIMEZONE:-Asia/Ho_Chi_Minh}
      - TZ=${TIMEZONE:-Asia/Ho_Chi_Minh}

      # ── Code Node: cho phép dùng mọi module Node.js built-in ─
      - NODE_FUNCTION_ALLOW_BUILTIN=*
      - NODE_FUNCTION_ALLOW_EXTERNAL=*

      # ── Python Task Runner (Code node → Python) ───────────────
      # n8n tự kích hoạt, chỉ cần venv đúng path trong image
      - N8N_RUNNERS_MODE=internal
      # Cho phép dùng tất cả stdlib và third-party Python packages
      - N8N_RUNNERS_STDLIB_ALLOW=*
      - N8N_RUNNERS_EXTERNAL_ALLOW=*
      # Trỏ tới Python trong venv đã tạo trong Dockerfile

      # ── Execute Command node ──────────────────────────────────
      # Cho phép chạy lệnh hệ thống qua Execute Command node
      # (không cần thêm biến, node đã hoạt động theo mặc định)

      # ── Database (mặc định SQLite, đổi sang Postgres nếu cần) ─
      - DB_TYPE=${DB_TYPE:-sqlite}
      # Bỏ comment dưới đây nếu dùng Postgres
      # - DB_TYPE=postgresdb
      # - DB_POSTGRESDB_HOST=postgres
      # - DB_POSTGRESDB_PORT=5432
      # - DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-n8n}
      # - DB_POSTGRESDB_USER=${POSTGRES_USER:-n8n}
      # - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD:-n8n_password}

      # ── Execution ─────────────────────────────────────────────
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=all
      - EXECUTIONS_DATA_SAVE_MANUAL_EXECUTIONS=true
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=336      # giữ log 14 ngày

      # ── Log ───────────────────────────────────────────────────
      - N8N_LOG_LEVEL=${N8N_LOG_LEVEL:-info}

    volumes:
      # Dữ liệu n8n (workflows, credentials, DB SQLite…)
      - n8n_data:/home/node/.n8n
      # Venv Python — nằm trên máy host, KHÔNG baked vào image
      # Lần đầu run: entrypoint tự tạo venv + cài packages
      - ./python-venv:/usr/local/lib/node_modules/@n8n/task-runner-python/.venv
      # requirements.txt mount vào /data — sửa file + restart là xong
      - ./requirements.txt:/data/requirements.txt:ro
      # Thư mục chia sẻ file giữa host và container
      - ./local-files:/data/files

  # ────────────────────────────────────────────────────────────
  #  (Tuỳ chọn) PostgreSQL — bỏ comment nếu muốn dùng Postgres
  # ────────────────────────────────────────────────────────────
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: n8n_postgres
  #   restart: unless-stopped
  #   environment:
  #     - POSTGRES_DB=${POSTGRES_DB:-n8n}
  #     - POSTGRES_USER=${POSTGRES_USER:-n8n}
  #     - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-n8n_password}
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n}"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

# ── Volumes ──────────────────────────────────────────────────
volumes:
  n8n_data:
    driver: local
  # postgres_data:
  #   driver: local
